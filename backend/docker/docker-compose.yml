# Docker Compose configuration for Smart Receipt Analysis system.

version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - MONGO_URL=mongodb://mongo:27017
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=your_neo4j_password
      - POSTGRES_URL=postgresql://user:password@postgres:5432/receipt_db
    depends_on:
      - mongo
      - neo4j
      - postgres
    volumes:
      - ./:/app
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # MongoDB
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db

  # Neo4j
  neo4j:
    image: neo4j:latest
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      - NEO4J_AUTH=neo4j/your_neo4j_password
    volumes:
      - neo4j_data:/data

  # PostgreSQL
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=receipt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis (for caching)
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  mongo_data:
  neo4j_data:
  postgres_data:
